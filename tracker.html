<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pulso Tracker">
<meta name="theme-color" content="#0d0f0d">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Pulso · Tracker 24/7</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f0d;
  --bg2: #111411;
  --surface: #1a1f1a;
  --border: rgba(255,255,255,0.09);
  --text: #e8ede8;
  --text2: #8a9e8a;
  --text3: #556655;
  --accent: #3ddc84;
  --amber: #f0a500;
  --red: #e85050;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 16px 40px;
  gap: 16px;
}

.header {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.logo-mark {
  width: 30px; height: 30px;
  background: var(--accent);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
}
.logo-mark svg { width: 16px; height: 16px; }
.logo-text { font-family: var(--mono); font-size: .95rem; font-weight: 600; }
.logo-sub { font-size: .65rem; color: var(--text3); margin-left: auto; font-family: var(--mono); letter-spacing: .5px; }

.status-card {
  width: 100%;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.status-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
}

.status-indicator {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: .85rem;
  font-weight: 600;
}
.status-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--text3);
}
.status-dot.active { background: var(--accent); animation: blink 1.4s ease-in-out infinite; }
.status-dot.error { background: var(--red); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

.cam-label {
  font-family: var(--mono);
  font-size: .7rem;
  color: var(--text3);
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 3px 10px;
  border-radius: 3px;
}
.cam-label b { color: var(--accent); }

.gps-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.gps-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 12px;
}
.gps-val {
  font-family: var(--mono);
  font-size: .95rem;
  font-weight: 600;
  color: var(--text);
}
.gps-lbl {
  font-size: .58rem;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: .7px;
  margin-top: 3px;
}

.coords-display {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 12px;
  font-family: var(--mono);
  font-size: .72rem;
  color: var(--text2);
  word-break: break-all;
  line-height: 1.6;
}
.coords-display span { color: var(--accent); }

.last-sync {
  font-family: var(--mono);
  font-size: .65rem;
  color: var(--text3);
  text-align: center;
}

.config-card {
  width: 100%;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.config-title {
  font-family: var(--mono);
  font-size: .7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text3);
}

.field { display: flex; flex-direction: column; gap: 5px; }
.field label {
  font-size: .7rem;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: .5px;
  font-family: var(--mono);
}
.field input, .field select {
  background: var(--bg);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 4px;
  padding: 10px 12px;
  font-size: .83rem;
  font-family: var(--sans);
  color: var(--text);
  outline: none;
  width: 100%;
}
.field input:focus, .field select:focus {
  border-color: var(--accent);
}
.field select option { background: var(--bg2); }

.btn-start {
  width: 100%;
  padding: 15px;
  border-radius: 8px;
  border: none;
  font-size: 1rem;
  font-weight: 700;
  font-family: var(--sans);
  cursor: pointer;
  transition: .15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.btn-start.start {
  background: var(--accent);
  color: #0d0f0d;
}
.btn-start.start:hover { background: #2ab86a; }
.btn-start.stop {
  background: rgba(232,80,80,.15);
  border: 1px solid var(--red);
  color: var(--red);
}
.btn-start.stop:hover { background: rgba(232,80,80,.25); }
.btn-start svg { width: 18px; height: 18px; }

.log-card {
  width: 100%;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.log-title {
  font-family: var(--mono);
  font-size: .65rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text3);
}
.log-entries {
  display: flex;
  flex-direction: column;
  gap: 4px;
  max-height: 150px;
  overflow-y: auto;
}
.log-entry {
  font-family: var(--mono);
  font-size: .67rem;
  color: var(--text3);
  display: flex;
  gap: 8px;
}
.log-entry .log-time { color: var(--text3); flex-shrink: 0; }
.log-entry .log-msg { color: var(--text2); }
.log-entry.ok .log-msg { color: var(--accent); }
.log-entry.err .log-msg { color: var(--red); }
.log-entry.warn .log-msg { color: var(--amber); }

.acc-bar-wrap { display: flex; align-items: center; gap: 8px; }
.acc-bar-track { flex: 1; height: 4px; background: var(--surface); border-radius: 2px; overflow: hidden; }
.acc-bar-fill { height: 100%; border-radius: 2px; transition: width .5s, background .5s; }
.acc-label { font-family: var(--mono); font-size: .65rem; color: var(--text3); white-space: nowrap; }

.conn-pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: rgba(232,80,80,.12);
  border: 1px solid rgba(232,80,80,.25);
  color: var(--red);
  padding: 3px 9px;
  border-radius: 3px;
  font-size: .65rem;
  font-weight: 600;
  font-family: var(--mono);
  letter-spacing: .4px;
}
.conn-pill.ok {
  background: rgba(61,220,132,.1);
  border-color: rgba(61,220,132,.2);
  color: var(--accent);
}
.conn-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

.tip-banner {
  position: fixed;
  bottom: 20px;
  left: 20px;
  right: 20px;
  background: var(--surface);
  border-left: 3px solid var(--accent);
  border-radius: 8px;
  padding: 12px;
  font-size: 0.7rem;
  font-family: var(--mono);
  color: var(--text2);
  z-index: 1000;
  backdrop-filter: blur(10px);
  text-align: center;
  animation: slideUp 0.3s ease;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
@keyframes slideUp {
  from { transform: translateY(100%); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.offline-badge {
  background: var(--amber);
  color: #0d0f0d;
  padding: 2px 6px;
  border-radius: 3px;
  font-size: 0.6rem;
  font-weight: 700;
  margin-left: 8px;
}
</style>

<div class="header">

  </div>

</div>

<div class="status-card">

<div class="config-card" id="configCard">

  </div>
  <div class="field">

  </div>
  <div class="field">
    <label>Intervalo de envío (recomendado: 10-30s)</label>
    <select id="inputInterval">
      <option value="5000">Cada 5 segundos</option>
      <option value="10000" selected>Cada 10 segundos</option>
      <option value="30000">Cada 30 segundos</option>
      <option value="60000">Cada 1 minuto</option>
      <option value="120000">Cada 2 minutos</option>
    </select>
  </div>
  <div class="field">
    <label>Modo de precisión</label>
    <select id="inputAccuracy">
      <option value="high" selected>Alta precisión (recomendado)</option>
      <option value="balanced">Balanceado (ahorro batería)</option>
      <option value="low">Solo red (máximo ahorro)</option>
    </select>
  </div>
</div>

<button class="btn-start start" id="mainBtn">
  <svg viewBox="0 0 20 20" fill="none">
    <circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="1.5"/>
    <circle cx="10" cy="10" r="3" fill="currentColor"/>
    <circle cx="10" cy="10" r="6" stroke="currentColor" stroke-width="1" stroke-dasharray="2 2" opacity=".5"/>
  </svg>
  Iniciar rastreo 24/7
</button>

<div class="log-card">
  <div class="log-title">Registro de actividad <span id="logCounter" style="color: var(--accent);">0</span></div>
  <div class="log-entries" id="logEntries">
    <div class="log-entry"><span class="log-time">--:--</span><span class="log-msg">Esperando inicio...</span></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// CONFIGURACIÓN FIREBASE - COMPLETAR CON TUS DATOS
// ═══════════════════════════════════════════════════════════════

  appId:             "1:680696841015:web:6c39a93729bdf13d3910b2"
};
// ═══════════════════════════════════════════════════════════════

let db = null;
let firebaseOk = false;
let tracking = false;
let watchId = null;
let sendTimer = null;
let forceGpsTimer = null;    // NEW: timer GPS forzado
let watchdogTimer = null;    // NEW: vigilante de GPS muerto
let lastPos = null;
let sendCount = 0;
let wakeLock = null;
let offlineQueue = [];
let retryCount = 0;
let lastSuccessfulSend = null;
let lastGpsUpdate = null;    // NEW: timestamp ultimo GPS real
let keepAliveInterval = null;
let noSleepVideo = null;     // NEW: video truco anti-sleep iOS

// Elementos DOM
const elements = {
  fbPill: document.getElementById('fbPill'),
  connLabel: document.getElementById('connLabel'),
  connDot: document.getElementById('connDot'),
  statusDot: document.getElementById('statusDot'),
  statusText: document.getElementById('statusText'),
  camIdDisplay: document.getElementById('camIdDisplay'),
  valVel: document.getElementById('valVel'),
  valAcc: document.getElementById('valAcc'),
  valLat: document.getElementById('valLat'),
  valLng: document.getElementById('valLng'),
  accFill: document.getElementById('accFill'),
  accLabel: document.getElementById('accLabel'),
  coordsDisplay: document.getElementById('coordsDisplay'),
  lastSync: document.getElementById('lastSync'),
  queueStatus: document.getElementById('queueStatus'),
  mainBtn: document.getElementById('mainBtn'),
  inputCamId: document.getElementById('inputCamId'),
  inputChofer: document.getElementById('inputChofer'),
  inputInterval: document.getElementById('inputInterval'),
  inputAccuracy: document.getElementById('inputAccuracy'),
  logEntries: document.getElementById('logEntries'),
  logCounter: document.getElementById('logCounter')
};

// Cargar Firebase
async function initFirebase() {
  try {
    const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
    const { getDatabase, ref, set, push, serverTimestamp, onDisconnect } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js");
    
    const app = initializeApp(FIREBASE_CONFIG);
    db = getDatabase(app);
    window.dbRef = ref;
    window.dbSet = set;
    window.dbPush = push;
    window.dbServerTimestamp = serverTimestamp;
    window.dbOnDisconnect = onDisconnect;
    
    firebaseOk = true;
    elements.fbPill.classList.add('ok');
    elements.connLabel.textContent = 'FIREBASE OK';
    elements.connDot.classList.add('ok');
    addLog('✅ Firebase conectado - Modo 24/7 activo', 'ok');
  } catch(e) {
    addLog('❌ Error Firebase: ' + e.message, 'err');
    firebaseOk = false;
  }
}

function addLog(msg, type = '') {
  const container = elements.logEntries;
  const d = new Date();
  const time = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
  const entry = document.createElement('div');
  entry.className = `log-entry ${type}`;
  entry.innerHTML = `<span class="log-time">${time}</span><span class="log-msg">${msg}</span>`;
  container.insertBefore(entry, container.firstChild);
  
  let logCount = parseInt(elements.logCounter.textContent) + 1;
  elements.logCounter.textContent = logCount;
  
  while (container.children.length > 50) container.removeChild(container.lastChild);
}

function saveTrackingState() {
  if (tracking) {
    localStorage.setItem('tracker_active', 'true');
    localStorage.setItem('tracker_camId', elements.inputCamId.value);
    localStorage.setItem('tracker_chofer', elements.inputChofer.value);
    localStorage.setItem('tracker_interval', elements.inputInterval.value);
  } else {
    localStorage.setItem('tracker_active', 'false');
  }
}

function saveQueue() {
  localStorage.setItem('tracker_queue', JSON.stringify(offlineQueue));
  if (offlineQueue.length > 0) {
    elements.queueStatus.textContent = `📦 ${offlineQueue.length} posiciones en espera`;
    elements.queueStatus.style.display = 'block';
  } else {
    elements.queueStatus.textContent = '';
    elements.queueStatus.style.display = 'none';
  }
}

async function requestWakeLock() {
  // Método 1: WakeLock API nativa (Chrome Android)
  if ('wakeLock' in navigator && !wakeLock) {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      addLog('💡 WakeLock activo', 'ok');
      wakeLock.addEventListener('release', () => {
        wakeLock = null;
        // Re-pedir inmediatamente si seguimos rastreando
        if (tracking) setTimeout(() => requestWakeLock(), 1000);
      });
    } catch(e) {
      addLog('⚠️ WakeLock: ' + e.message, 'warn');
    }
  }
  // Método 2: Video invisible (truco iOS/Safari anti-sleep)
  startNoSleepVideo();
}

function startNoSleepVideo() {
  // Video de 1x1 pixel en loop — evita que iOS duerma el navegador
  if (noSleepVideo) return;
  try {
    noSleepVideo = document.createElement('video');
    noSleepVideo.setAttribute('playsinline', '');
    noSleepVideo.setAttribute('muted', '');
    noSleepVideo.setAttribute('loop', '');
    noSleepVideo.style.cssText = 'position:fixed;width:1px;height:1px;opacity:0.01;top:0;left:0;pointer-events:none;';
    // MP4 de 1x1 pixel en base64 (2s, silencioso)
    const src = 'data:video/mp4;base64,AAAAIGZ0eXBpc29tAAACAGlzb21pc28ybXA0MWF2YzEAAAAIZnJlZQAAAs1tZGF0AAACrgYF//+q3EXpvebZSLeWLNgg2SPu73gyNjQgLSBjb3JlIDE0MiByMjQ3OSBkZDc5YTYxIC0gSC4yNjQvTVBFRy00IEFWQ2NvZGVjIC0gQ29weWxlZnQgMjAwMy0yMDE0IC0gaHR0cDovL3d3dy52aWRlb2xhbi5vcmcveDI2NC5odG1sIC0gb3B0aW9uczogY2FiYWM9MSByZWY9MyBkZWJsb2NrPTE6MDowIGFuYWx5c2U9MHgzOjB4MTEzIG1lPWhleCBzdWJtZT03IHBzeT0xIHBzeV9yZD0xLjAwOjAuMDAgbWl4ZWRfcmVmPTEgbWVfcmFuZ2U9MTYgY2hyb21hX21lPTEgdHJlbGxpcz0xIDh4OGRjdD0xIGNxbT0wIGRlYWR6b25lPTIxLDExIGZhc3RfcHNraXA9MSBjaHJvbWFfcXBfb2Zmc2V0PS0yIHRocmVhZHM9NjAgbG9va2FoZWFkX3RocmVhZHM9MTAgc2xpY2VkX3RocmVhZHM9MCBucj0wIGRlY2ltYXRlPTEgaW50ZXJsYWNlZD0wIGJsdXJheV9jb21wYXQ9MCBjb25zdHJhaW5lZF9pbnRyYT0wIGJmcmFtZXM9MyBiX3B5cmFtaWQ9MiByZWZzPTMgd2VpZ2h0cD0yIGtleWludD0yNTAga2V5aW50X21pbj0yNSBzY2VuZWN1dD00MCBpbnRyYV9yZWZyZXNoPTAgcmNfbG9va2FoZWFkPTQwIHJjPWNyZiBtYnRyZWU9MSBjcmY9MjMuMCBxY29tcD0wLjYwIHFwbWluPTAgcXBtYXg9NjkgcXBzdGVwPTQgaXBfcmF0aW89MS40MCBhcT0xOjEuMDAAgAAAAFZliIQL8mKAAKvMnJycnJycnJycnJycnJycnJycnJycnJycnJycnJycnJycnJycnJycnJycnJycnJycnJycnJycnJycnJycnJycnJycnJycnJycnJycnJycnJycnAAAAAxBmiSWAAAGMAAYkAAAAAlBmjCWAAAGMAAYkAAAAAlBmjiWAAAGMAAYkAAAAAlBmliWAAAGMAAYkAAAAAlBmmCWAAAGMAAYkAAAAAlBmmSWAAAGMAAYkAAAAAlBmpiWAAAGMAAYk';
    noSleepVideo.src = src;
    document.body.appendChild(noSleepVideo);
    noSleepVideo.play().catch(() => {}); // Silencioso si falla
    addLog('📺 Anti-sleep video activo', 'ok');
  } catch(e) {}
}

function stopNoSleepVideo() {
  if (noSleepVideo) {
    noSleepVideo.pause();
    noSleepVideo.remove();
    noSleepVideo = null;
  }
}

function releaseWakeLock() {
  if (wakeLock) {
    wakeLock.release();
    wakeLock = null;
  }
  stopNoSleepVideo();
}

function getGeoOptions() {
  const mode = elements.inputAccuracy.value;
  if (mode === 'balanced') {
    return { enableHighAccuracy: false, timeout: 20000, maximumAge: 5000 };
  } else if (mode === 'low') {
    return { enableHighAccuracy: false, timeout: 10000, maximumAge: 10000 };
  }
  return { enableHighAccuracy: true, timeout: 30000, maximumAge: 0 };
}

async function sendToFirebase(camId, chofer, pos) {
  if (!db || !window.dbSet) return false;
  
  const { latitude, longitude, accuracy, speed } = pos.coords;
  const kmh = speed ? Math.round(speed * 3.6) : 0;
  const timestamp = Date.now();
  
  const positionData = {
    id: camId,
    chofer: chofer,
    lat: latitude,
    lng: longitude,
    accuracy: Math.round(accuracy),
    vel: kmh,
    ts: timestamp,
    online: true
  };
  
  try {
    await window.dbSet(window.dbRef(db, 'posiciones/' + camId), positionData);
    await window.dbPush(window.dbRef(db, 'historial/' + camId), positionData);
    
    sendCount++;
    lastSuccessfulSend = new Date();
    
    const now = new Date();
    const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
    elements.lastSync.innerHTML = `✅ ${timeStr} · Envío #${sendCount}`;
    
    if (offlineQueue.length === 0) {
      addLog(`📍 #${sendCount} → ${latitude.toFixed(5)}, ${longitude.toFixed(5)} | ${kmh}km/h`, 'ok');
    }
    
    return true;
  } catch(e) {
    offlineQueue.push(positionData);
    saveQueue();
    addLog(`📦 ${offlineQueue.length} pendientes (sin conexión)`, 'warn');
    elements.lastSync.innerHTML = `⚠️ ${offlineQueue.length} posiciones guardadas`;
    return false;
  }
}

async function flushOfflineQueue(camId, chofer) {
  if (offlineQueue.length === 0) return;
  if (!navigator.onLine) return;
  
  addLog(`📤 Enviando ${offlineQueue.length} pendientes...`, 'ok');
  let successCount = 0;
  
  for (const pos of [...offlineQueue]) {
    try {
      await window.dbSet(window.dbRef(db, 'posiciones/' + camId), pos);
      await window.dbPush(window.dbRef(db, 'historial/' + camId), pos);
      offlineQueue.shift();
      successCount++;
      saveQueue();
    } catch(e) {
      break;
    }
  }
  
  if (successCount > 0) {
    addLog(`✅ ${successCount} sincronizados`, 'ok');
  }
}

function updateUI(pos) {
  const { latitude, longitude, accuracy, speed } = pos.coords;
  const kmh = speed ? Math.round(speed * 3.6) : 0;
  
  elements.valLat.textContent = latitude.toFixed(6);
  elements.valLng.textContent = longitude.toFixed(6);
  elements.valAcc.textContent = Math.round(accuracy);
  elements.valVel.textContent = kmh;
  
  const pct = Math.max(0, Math.min(100, 100 - (accuracy / 100)));
  elements.accFill.style.width = pct + '%';
  elements.accFill.style.background = accuracy < 20 ? 'var(--accent)' : accuracy < 50 ? 'var(--amber)' : 'var(--red)';
  
  let accText = accuracy < 20 ? 'Excelente' : accuracy < 50 ? 'Buena' : 'Baja precisión';
  elements.accLabel.textContent = accText;
  
  elements.coordsDisplay.innerHTML = `Lat: <span>${latitude.toFixed(6)}</span><br>Lng: <span>${longitude.toFixed(6)}</span><br>Precisión: <span>${Math.round(accuracy)}m</span> | Vel: <span>${kmh} km/h</span>`;
  elements.statusText.textContent = `Rastreando | ${kmh}km/h`;
}

function startKeepAlive() {
  if (keepAliveInterval) clearInterval(keepAliveInterval);
  keepAliveInterval = setInterval(() => {
    if (tracking && lastSuccessfulSend && (new Date() - lastSuccessfulSend) > 60000) {
      elements.lastSync.style.color = 'var(--amber)';
    } else if (elements.lastSync) {
      elements.lastSync.style.color = 'var(--text3)';
    }
  }, 15000);
  
  document.addEventListener('visibilitychange', handleVisibilityChange);
}

function stopKeepAlive() {
  if (keepAliveInterval) clearInterval(keepAliveInterval);
  document.removeEventListener('visibilitychange', handleVisibilityChange);
}

function handleVisibilityChange() {
  if (!document.hidden && tracking) {
    addLog('🔄 App reanudada — forzando GPS...', 'ok');
    // Re-pedir WakeLock (se libera al ir al fondo)
    requestWakeLock();
    // Forzar posición inmediatamente al volver
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        lastPos = pos;
        lastGpsUpdate = Date.now();
        updateUI(pos);
        const camId = elements.inputCamId.value.trim();
        const chofer = elements.inputChofer.value.trim();
        sendToFirebase(camId, chofer, pos);
        addLog('📍 Posición forzada al reanudar', 'ok');
      },
      (err) => { addLog('⚠️ GPS al reanudar: ' + err.message, 'warn'); },
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
    );
  }
}

function showPersistentTip() {
  const tip = document.createElement('div');
  tip.className = 'tip-banner';
  tip.innerHTML = `
    <strong>📱 Rastreo 24/7 ACTIVADO</strong><br><br>
    ✅ La app sigue activa en segundo plano<br>
    📍 Posiciones guardadas sin conexión<br>
    🔧 Para mejor rendimiento:<br>
    • Android: Ajustes → Batería → Sin restricciones<br>
    • iOS: Configuración → Safari → Ubicación → Siempre<br>
    <small>🕐 Click para cerrar</small>
  `;
  document.body.appendChild(tip);
  tip.onclick = () => tip.remove();
  setTimeout(() => tip.remove(), 10000);
}

function startTracking() {
  const camId = elements.inputCamId.value.trim();
  const chofer = elements.inputChofer.value.trim();
  
  if (!camId) { addLog('❌ Ingresá ID de camión', 'warn'); return false; }
  if (!chofer) { addLog('❌ Ingresá nombre del chofer', 'warn'); return false; }
  if (!firebaseOk) { addLog('❌ Firebase no conectado', 'err'); return false; }

  if (!navigator.geolocation) {
    addLog('❌ GPS no soportado en este navegador', 'err');
    return false;
  }
  _doStartTracking(camId, chofer);
}

function _doStartTracking(camId, chofer) {

  tracking = true;
  elements.camIdDisplay.textContent = camId;
  elements.configCard.style.opacity = '.5';
  elements.configCard.style.pointerEvents = 'none';
  elements.mainBtn.className = 'btn-start stop';
  elements.mainBtn.innerHTML = `<svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="1.5"/><circle cx="10" cy="10" r="3" fill="currentColor"/></svg> Rastreo activo`;
  elements.mainBtn.disabled = true;
  elements.mainBtn.style.opacity = '0.5';
  elements.mainBtn.style.cursor = 'not-allowed';
  elements.statusDot.classList.add('active');
  elements.statusText.textContent = 'Iniciando GPS...';
  
  saveTrackingState();
  requestWakeLock();
  
  if (db && window.dbSet && window.dbOnDisconnect) {
    const presenceRef = window.dbRef(db, 'status/' + camId);
    window.dbSet(presenceRef, { id: camId, chofer: chofer, online: true, startTime: Date.now() });
    window.dbOnDisconnect(presenceRef).set({ online: false, lastSeen: window.dbServerTimestamp() });
  }
  
  const geoOptions = getGeoOptions();
  
  // ── ESTRATEGIA 1: watchPosition continuo ──
  function iniciarWatch() {
    if (watchId) navigator.geolocation.clearWatch(watchId);
    watchId = navigator.geolocation.watchPosition(
      (pos) => {
        lastPos = pos;
        lastGpsUpdate = Date.now();
        updateUI(pos);
        sendToFirebase(camId, chofer, pos);
        if (offlineQueue.length > 0 && navigator.onLine) flushOfflineQueue(camId, chofer);
        retryCount = 0;
      },
      (err) => {
        if (err.code === 1) {
          addLog('❌ Permiso GPS denegado — andá a Ajustes › Chrome › Permisos › Ubicación › Permitir', 'err');
          elements.statusText.textContent = 'Permiso denegado';
          stopTracking();
          return;
        }
        let msg = err.code === 2 ? 'GPS no disponible' : 'Timeout GPS';
        addLog(`⚠️ ${msg} — reintentando en 5s...`, 'err');
        elements.statusText.textContent = msg;
        if (tracking && retryCount < 20) {
          retryCount++;
          setTimeout(() => { if (tracking) iniciarWatch(); }, 5000);
        }
      },
      geoOptions
    );
  }
  iniciarWatch();

  // ── ESTRATEGIA 2: getCurrentPosition forzado cada 15s (respaldo) ──
  if (forceGpsTimer) clearInterval(forceGpsTimer);
  forceGpsTimer = setInterval(() => {
    if (!tracking) return;
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        // Solo usar si es más reciente que lastPos
        const esNueva = !lastGpsUpdate || (Date.now() - lastGpsUpdate) > 10000;
        if (esNueva) {
          lastPos = pos;
          lastGpsUpdate = Date.now();
          updateUI(pos);
          sendToFirebase(camId, chofer, pos);
          addLog(`🔁 GPS forzado → ${pos.coords.latitude.toFixed(5)}`, 'ok');
        }
      },
      () => {},
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
    );
  }, 15000);

  // ── ESTRATEGIA 3: Watchdog — si GPS muere 90s, reiniciar watch ──
  if (watchdogTimer) clearInterval(watchdogTimer);
  watchdogTimer = setInterval(() => {
    if (!tracking) return;
    const silencio = lastGpsUpdate ? (Date.now() - lastGpsUpdate) : Infinity;
    if (silencio > 90000) {
      addLog('🐕 Watchdog: GPS muerto 90s — reiniciando...', 'warn');
      iniciarWatch();
      requestWakeLock();
    } else if (silencio > 60000) {
      addLog('⏱️ Sin GPS por ' + Math.round(silencio/1000) + 's', 'warn');
    }
  }, 30000);

  const interval = parseInt(elements.inputInterval.value);
  sendTimer = setInterval(() => {
    if (lastPos && tracking) sendToFirebase(camId, chofer, lastPos);
  }, interval);
  
  startKeepAlive();
  addLog(`🚛 Rastreo 24/7 | ${camId} - ${chofer} | cada ${interval/1000}s`, 'ok');
  setTimeout(showPersistentTip, 2000);
  
  return true;
} // fin _doStartTracking

function stopTracking() {
  tracking = false;
  
  if (watchId) { navigator.geolocation.clearWatch(watchId); watchId = null; }
  if (sendTimer) { clearInterval(sendTimer); sendTimer = null; }
  if (forceGpsTimer) { clearInterval(forceGpsTimer); forceGpsTimer = null; }
  if (watchdogTimer) { clearInterval(watchdogTimer); watchdogTimer = null; }
  
  releaseWakeLock();
  stopKeepAlive();
  
  elements.mainBtn.className = 'btn-start start';
  elements.mainBtn.disabled = false;
  elements.mainBtn.style.opacity = '1';
  elements.mainBtn.style.cursor = 'pointer';
  elements.mainBtn.innerHTML = `<svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="1.5"/><circle cx="10" cy="10" r="3" fill="currentColor"/><circle cx="10" cy="10" r="6" stroke="currentColor" stroke-width="1" stroke-dasharray="2 2" opacity=".5"/></svg> Iniciar rastreo 24/7`;
  elements.statusDot.classList.remove('active');
  elements.statusText.textContent = 'Inactivo';
  elements.configCard.style.opacity = '1';
  elements.configCard.style.pointerEvents = 'auto';
  
  const camId = elements.inputCamId.value.trim();
  if (db && window.dbSet && camId) {
    window.dbSet(window.dbRef(db, 'status/' + camId), { online: false, lastSeen: Date.now() });
  }
  
  saveTrackingState();
  addLog('🛑 Rastreo detenido', 'warn');
}

function toggleTracking() {
  // Solo permite iniciar, nunca detener desde el tracker
  if (!tracking) startTracking();
}

function loadSavedState() {
  const wasTracking = localStorage.getItem('tracker_active') === 'true';
  const savedCamId = localStorage.getItem('tracker_camId');
  const savedChofer = localStorage.getItem('tracker_chofer');
  const savedInterval = localStorage.getItem('tracker_interval');
  const savedQueue = localStorage.getItem('tracker_queue');
  
  if (savedCamId) elements.inputCamId.value = savedCamId;
  if (savedChofer) elements.inputChofer.value = savedChofer;
  if (savedInterval) elements.inputInterval.value = savedInterval;
  
  if (savedQueue) {
    try {
      offlineQueue = JSON.parse(savedQueue);
      saveQueue();
      if (offlineQueue.length) addLog(`📦 ${offlineQueue.length} posiciones pendientes`, 'warn');
    } catch(e) {}
  }
  
  if (wasTracking && savedCamId && savedChofer) {
    addLog('🔄 Reanudando rastreo automático...', 'ok');
    setTimeout(() => startTracking(), 1000);
  }
}

elements.mainBtn.onclick = toggleTracking;

window.addEventListener('online', () => {
  addLog('🌐 Conexión recuperada', 'ok');
  const camId = elements.inputCamId.value.trim();
  const chofer = elements.inputChofer.value.trim();
  if (tracking && camId && chofer) flushOfflineQueue(camId, chofer);
});

window.addEventListener('offline', () => {
  addLog('⚠️ Sin conexión - guardando localmente', 'warn');
});

initFirebase();
loadSavedState();
addLog('Tracker 24/7 listo', 'ok');

// ── SERVICE WORKER — rastreo en segundo plano ──
if ('serviceWorker' in navigator) {
  // GitHub Pages: el SW debe estar en la raíz del repo
  const swPath = location.pathname.includes('/pulso-py/') 
    ? '/pulso-py/sw.js' 
    : '/sw.js';
  navigator.serviceWorker.register(swPath).then(reg => {
    addLog('SW activo — segundo plano habilitado', 'ok');
    navigator.serviceWorker.addEventListener('message', event => {
      if (event.data?.type === 'FLUSH_QUEUE') {
        const camId  = elements.inputCamId.value.trim();
        const chofer = elements.inputChofer.value.trim();
        if (camId && chofer) flushOfflineQueue(camId, chofer);
      }
      if (event.data?.type === 'SW_ALIVE') {
        // SW confirmó que sigue vivo
      }
    });
  }).catch(e => addLog('SW no disponible: ' + e.message, 'warn'));
}

// ── KEEP ALIVE al SW cada 15s ──
setInterval(() => {
  if (navigator.serviceWorker?.controller) {
    navigator.serviceWorker.controller.postMessage({ type: 'KEEP_ALIVE' });
  }
}, 15000);

// ── BACKGROUND SYNC ──
window.addEventListener('online', async () => {
  addLog('Red recuperada', 'ok');
  const camId  = elements.inputCamId.value.trim();
  const chofer = elements.inputChofer.value.trim();
  if (tracking && camId && chofer) flushOfflineQueue(camId, chofer);
  if ('serviceWorker' in navigator && 'sync' in ServiceWorkerRegistration.prototype) {
    const reg = await navigator.serviceWorker.ready;
    reg.sync.register('sync-positions').catch(() => {});
  }
});

// ── TRUCO iOS: re-pedir WakeLock en cualquier interacción del usuario ──
['touchstart', 'touchend', 'click'].forEach(ev => {
  document.addEventListener(ev, () => {
    if (tracking && !wakeLock) requestWakeLock();
  }, { passive: true });
});
</script>
